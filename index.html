function findCity(input){
  if(!input) return null;
  const s=input.trim().toLowerCase();
  for(const [name,data] of Object.entries(CITIES)){
    if(name.toLowerCase()===s||name.toLowerCase().startsWith(s)) return {...data,name};
  }
  return null;
}

        {/* Footer */}
        <div className="no-print" style={{display:"flex",gap:10,marginTop:28,paddingTop:24,borderTop:`1px solid ${C.border}`}}>
          <button onClick={()=>window.print()} style={{flex:1,padding:"14px",background:C.sage,border:"none",borderRadius:8,...f.dm("12px"),cursor:"pointer",color:"#ffffff",fontWeight:500,letterSpacing:"0.05em",boxShadow:"0 2px 12px rgba(160,120,48,0.25)"}}>⬇ Download PDF</button>
          <button onClick={()=>setStep("form")} style={{flex:1,padding:"14px",background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:8,...f.dm("12px"),cursor:"pointer",color:C.text3,fontWeight:400}}>New Reading</button>
        </div>
        <div style={{textAlign:"center",marginTop:16,...f.dm("12px"),color:C.text3,lineHeight:1.7,fontWeight:400}}>
          {"This reading is an interpretive framework across six traditions — not scientific fact."}<br/>
          {"The Psychic Vault"}
        </div>
      </div>
    </div>
  </div>
  );
}

function FField({label,type="text",value,onChange,placeholder}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <label style={{fontFamily:"'Cinzel',serif",fontSize:"7.5px",letterSpacing:"0.25em",textTransform:"uppercase",color:"#9a9088"}}>{label}</label>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder||""} style={{background:"#f7f6f0",border:"1px solid rgba(255,255,255,0.06)",borderRadius:4,padding:"10px 12px",fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"#1a1814",width:"100%"}}/>
    </div>
  );
}
function FSel({label,value,onChange,opts}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <label style={{fontFamily:"'Cinzel',serif",fontSize:"7.5px",letterSpacing:"0.25em",textTransform:"uppercase",color:"#9a9088"}}>{label}</label>
      <select value={value} onChange={onChange} style={{background:"#f7f6f0",border:"1px solid rgba(255,255,255,0.06)",borderRadius:4,padding:"10px 12px",fontFamily:"'DM Sans',sans-serif",fontSize:"13px",color:"#1a1814",width:"100%",cursor:"pointer"}}>
        {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
      </select>
    </div>
  );
}
function RC({title,eyebrow,badge,badgeBg,badgeColor,children}){
  return(
    <div style={{background:"#ffffff",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,marginBottom:14}}>
      <div style={{padding:"16px 22px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:10}}>
        {badge&&<div style={{width:30,height:30,borderRadius:"50%",background:badgeBg,color:badgeColor,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cinzel',serif",fontSize:"9px",flexShrink:0}}>{badge}</div>}
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"7px",letterSpacing:"0.25em",textTransform:"uppercase",color:"#9a9088",marginBottom:2}}>{eyebrow}</div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1rem",color:"#1a1814"}}>{title}</div>
        </div>
      </div>
      <div style={{padding:"18px 22px",fontSize:"13.5px",lineHeight:1.85,color:"#5a5248"}}>{children}</div>
    </div>
  );
}
function P({children,style={}}){
  return <p style={{marginBottom:11,lineHeight:1.85,fontSize:"13.5px",color:"#5a5248",...style}}>{children}</p>;
}
function FL({children}){
  return <span style={{fontFamily:"'Cinzel',serif",fontSize:"7.5px",letterSpacing:"0.22em",textTransform:"uppercase",color:"#a07830",display:"block",marginTop:14,marginBottom:5}}>{children}</span>;
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PsychicVaultReading));
  </script>
